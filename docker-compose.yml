version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colony-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://colony_user:colony_password@postgres:5432/colony_db
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: colony-postgres
    environment:
      POSTGRES_DB: colony_db
      POSTGRES_USER: colony_user
      POSTGRES_PASSWORD: colony_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colony_user -d colony_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  seeder:
    image: python:3.13-slim
    container_name: colony-seeder
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./seed_data.yaml:/seed_data.yaml
    environment:
      DATABASE_URL: postgresql://colony_user:colony_password@postgres:5432/colony_db
      SEED_FILE: /seed_data.yaml
      SEED_MODE: ${SEED_MODE:-full}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-colony-admin}
      PYTHONPATH: /app
      UV_PROJECT_ENVIRONMENT: /tmp/.venv
    command: >-
      bash -c "pip install uv --quiet && uv sync --no-dev --quiet &&
      uv run python scripts/seed_db.py"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: colony-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: pgAdmin for database management
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: colony-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@colony.local
  #     PGADMIN_DEFAULT_PASSWORD: admin123
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - "8080:80"
  #   depends_on:
  #     - postgres
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
