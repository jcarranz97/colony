apiVersion: v1
kind: Service
metadata:
  name: {{ include "colony.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "colony.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: {{ .Values.postgresql.port }}
      protocol: TCP
      name: postgresql
  selector:
    {{- include "colony.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
