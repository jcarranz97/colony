# Development seed data — auto-loaded on docker-compose up
#
# This file defines the initial data pre-loaded into the database when the
# project is started for the first time. It is safe to run multiple times
# (idempotent: existing records are skipped).
#
# Default dev credentials:
#   Email:    dev@colony.local
#   Password: colony123
#
# You can modify this file before running docker-compose for the first time
# to use your own credentials and payment methods.

# Exchange rates are seeded before users so MXN template generation works.
exchange_rates:
  - from_currency: MXN
    to_currency: USD
    rate: "0.050000"
    rate_date: "2026-01-01"

users:
  - email: dev@colony.local
    password: colony123
    first_name: John
    last_name: Doe
    preferred_currency: USD
    locale: en-US

    payment_methods:
      - name: US Bank Debit
        method_type: debit
        default_currency: USD
        description: Main US debit card
      - name: Cash USD
        method_type: cash
        default_currency: USD
      - name: MX Bank Debit
        method_type: debit
        default_currency: MXN
        description: Mexico debit card
      - name: Cash MXN
        method_type: cash
        default_currency: MXN

    recurrent_expenses:
      # --- Fixed USD expenses ---
      - description: Rent
        currency: USD
        payment_method_name: US Bank Debit
        base_amount: 1200.00
        category: fixed
        recurrence_type: monthly
        recurrence_config:
          day_of_month: 1
        reference_date: "2025-01-01"
        autopay_info: Auto-pay via bank portal

      - description: Internet
        currency: USD
        payment_method_name: US Bank Debit
        base_amount: 79.99
        category: fixed
        recurrence_type: monthly
        recurrence_config:
          day_of_month: 15
        reference_date: "2025-01-15"
        autopay_info: Auto-pay enabled

      - description: Netflix
        currency: USD
        payment_method_name: US Bank Debit
        base_amount: 15.99
        category: fixed
        recurrence_type: monthly
        recurrence_config:
          day_of_month: 8
        reference_date: "2025-01-08"

      # --- Variable USD expenses ---
      - description: Groceries US
        currency: USD
        payment_method_name: US Bank Debit
        base_amount: 150.00
        category: variable
        recurrence_type: weekly
        recurrence_config:
          day_of_week: 6
        reference_date: "2025-01-04"

      - description: Gas
        currency: USD
        payment_method_name: Cash USD
        base_amount: 60.00
        category: variable
        recurrence_type: bi_weekly
        recurrence_config:
          interval_days: 14
        reference_date: "2025-01-06"

      # --- Fixed MXN expenses ---
      - description: Gym Mexico
        currency: MXN
        payment_method_name: MX Bank Debit
        base_amount: 650.00
        category: fixed
        recurrence_type: monthly
        recurrence_config:
          day_of_month: 1
        reference_date: "2025-01-01"

      # --- Variable MXN expenses ---
      - description: Groceries MX
        currency: MXN
        payment_method_name: Cash MXN
        base_amount: 800.00
        category: variable
        recurrence_type: weekly
        recurrence_config:
          day_of_week: 0
        reference_date: "2025-01-05"

    # Cycles are created after templates so expenses can be generated.
    # Each 6-week window aligns with bi-weekly pay periods.
    cycles:
      - name: Jan-Feb 2026 Cycle
        start_date: "2026-01-01"
        end_date: "2026-02-11"
        income_amount: "5000.00"
        status: completed
        generate_from_templates: true

      - name: Feb-Mar 2026 Cycle
        start_date: "2026-02-12"
        end_date: "2026-03-25"
        income_amount: "5000.00"
        status: active
        generate_from_templates: true

      - name: Apr-May 2026 Cycle
        start_date: "2026-04-01"
        end_date: "2026-05-13"
        income_amount: "5200.00"
        status: draft
        generate_from_templates: true
